<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 680 900" role="img"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>FAIRaman v1.3 — Canonical Data Model</title>
  <desc>Architecture diagram: importer layer feeds a canonical dictionary that branches into regular_grid and point_coordinates geometry modes, each written by an HDF5/NeXus writer and CSV exporter.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6e7781" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════
       SECTION LABEL — IMPORTERS
  ══════════════════════════════════════════════════ -->
  <text x="40" y="30" font-size="10" font-weight="600" fill="#57606a" letter-spacing="0.08em">IMPORTER LAYER</text>
  <line x1="40" y1="34" x2="640" y2="34" stroke="#d0d7de" stroke-width="0.5"/>

  <!-- WDF importer -->
  <rect x="40" y="44" width="155" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="117" y="67" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">WDF importer</text>
  <text x="117" y="84" font-size="11" fill="#0f6e56" text-anchor="middle">renishawWiRE</text>

  <!-- ASCII importer -->
  <rect x="210" y="44" width="155" height="52" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="287" y="67" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">ASCII importer</text>
  <text x="287" y="84" font-size="11" fill="#0f6e56" text-anchor="middle">single spectrum / TXT</text>

  <!-- RamanSPy — dashed, future -->
  <rect x="380" y="44" width="160" height="52" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 2"/>
  <text x="460" y="67" font-size="13" font-weight="600" fill="#444441" text-anchor="middle">RamanSPy adapter</text>
  <text x="460" y="84" font-size="11" fill="#5f5e5a" text-anchor="middle">future: Horiba, WiTec…</text>

  <!-- Future -->
  <rect x="552" y="44" width="96" height="52" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 2"/>
  <text x="600" y="67" font-size="13" font-weight="600" fill="#444441" text-anchor="middle">Future…</text>
  <text x="600" y="84" font-size="11" fill="#5f5e5a" text-anchor="middle">MATLAB, WiTec</text>

  <!-- arrows down from importers -->
  <line x1="117" y1="96" x2="117" y2="148" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="287" y1="96" x2="287" y2="148" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="460" y1="96" x2="360" y2="148" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>
  <line x1="600" y1="96" x2="380" y2="148" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-dash)"/>

  <!-- ═══════════════════════════════════════════════
       CANONICAL DICTIONARY CONTAINER
  ══════════════════════════════════════════════════ -->
  <rect x="28" y="120" width="624" height="340" rx="14" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>

  <!-- container header -->
  <text x="340" y="148" font-size="14" font-weight="700" fill="#3c3489" text-anchor="middle">FAIRaman canonical dictionary</text>
  <text x="340" y="164" font-size="11" fill="#534ab7" text-anchor="middle">single contract between all importers and the HDF5/NeXus writer</text>
  <line x1="50" y1="172" x2="630" y2="172" stroke="#afa9ec" stroke-width="0.5"/>

  <!-- SPECTRAL DATA block -->
  <rect x="50" y="182" width="180" height="90" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="50" y="182" width="180" height="22" rx="8" fill="#afa9ec"/>
  <rect x="50" y="196" width="180" height="8" rx="0" fill="#afa9ec"/>
  <text x="140" y="198" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">spectral data</text>
  <text x="140" y="218" font-size="11" fill="#444441" text-anchor="middle">cube / spectra</text>
  <text x="140" y="233" font-size="11" fill="#444441" text-anchor="middle">np.ndarray</text>
  <text x="140" y="248" font-size="11" fill="#444441" text-anchor="middle">raman_shift  (nw,)</text>
  <text x="140" y="263" font-size="11" fill="#444441" text-anchor="middle">source_format</text>

  <!-- SPATIAL COORDINATES block -->
  <rect x="248" y="182" width="184" height="90" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="248" y="182" width="184" height="22" rx="8" fill="#afa9ec"/>
  <rect x="248" y="196" width="184" height="8" rx="0" fill="#afa9ec"/>
  <text x="340" y="198" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">spatial coordinates</text>
  <text x="340" y="218" font-size="11" fill="#444441" text-anchor="middle">x_axis, y_axis  →  grid</text>
  <text x="340" y="233" font-size="11" fill="#444441" text-anchor="middle">x, y  →  per-point</text>
  <text x="340" y="248" font-size="11" fill="#444441" text-anchor="middle">units: micrometers | index</text>
  <text x="340" y="263" font-size="11" fill="#444441" text-anchor="middle">white_light  ·  acq. map</text>

  <!-- PROVENANCE block -->
  <rect x="450" y="182" width="180" height="90" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="450" y="182" width="180" height="22" rx="8" fill="#afa9ec"/>
  <rect x="450" y="196" width="180" height="8" rx="0" fill="#afa9ec"/>
  <text x="540" y="198" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">provenance</text>
  <text x="540" y="218" font-size="11" fill="#444441" text-anchor="middle">coordinate_mode</text>
  <text x="540" y="233" font-size="11" fill="#444441" text-anchor="middle">coordinate_source</text>
  <text x="540" y="248" font-size="11" fill="#444441" text-anchor="middle">coordinate_validated</text>
  <text x="540" y="263" font-size="11" fill="#444441" text-anchor="middle">geometry_warning</text>

  <!-- row 2: reshape / optional -->
  <rect x="50" y="288" width="180" height="76" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="50" y="288" width="180" height="22" rx="8" fill="#afa9ec"/>
  <rect x="50" y="302" width="180" height="8" rx="0" fill="#afa9ec"/>
  <text x="140" y="304" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">reshape info</text>
  <text x="140" y="324" font-size="11" fill="#444441" text-anchor="middle">reshape_applied</text>
  <text x="140" y="339" font-size="11" fill="#444441" text-anchor="middle">reshape_source</text>
  <text x="140" y="354" font-size="11" fill="#888780" text-anchor="middle">e.g. "map_shape"</text>

  <rect x="248" y="288" width="184" height="76" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="248" y="288" width="184" height="22" rx="8" fill="#afa9ec"/>
  <rect x="248" y="302" width="184" height="8" rx="0" fill="#afa9ec"/>
  <text x="340" y="304" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">optional fields</text>
  <text x="340" y="324" font-size="11" fill="#444441" text-anchor="middle">white_light_meta</text>
  <text x="340" y="339" font-size="11" fill="#444441" text-anchor="middle">acquisition_map</text>
  <text x="340" y="354" font-size="11" fill="#444441" text-anchor="middle">instrument  { laser, step… }</text>

  <rect x="450" y="288" width="180" height="76" rx="8" fill="#ffffff" stroke="#afa9ec" stroke-width="0.75"/>
  <rect x="450" y="288" width="180" height="22" rx="8" fill="#afa9ec"/>
  <rect x="450" y="302" width="180" height="8" rx="0" fill="#afa9ec"/>
  <text x="540" y="304" font-size="11" font-weight="600" fill="#26215c" text-anchor="middle">filename / format</text>
  <text x="540" y="324" font-size="11" fill="#444441" text-anchor="middle">filename</text>
  <text x="540" y="339" font-size="11" fill="#444441" text-anchor="middle">source_format</text>
  <text x="540" y="354" font-size="11" fill="#888780" text-anchor="middle">"wdf" | "txt" | "ramanspy"</text>

  <!-- ═══════════════════════════════════════════════
       VALIDATE_CANONICAL GATE
  ══════════════════════════════════════════════════ -->

  <!-- arrow from canonical bottom to validate -->
  <line x1="340" y1="460" x2="340" y2="494" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="218" y="464" width="244" height="44" rx="22" fill="#faeeda" stroke="#854f0b" stroke-width="0.75"/>
  <text x="340" y="481" font-size="12" font-weight="700" fill="#633806" text-anchor="middle">validate_canonical( )</text>
  <text x="340" y="498" font-size="10" fill="#854f0b" text-anchor="middle">geometry coherence check — stops write on error</text>

  <!-- arrows branching left and right from validate -->
  <path d="M270 508 L175 548" fill="none" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M410 508 L505 548" fill="none" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════
       SECTION LABEL — GEOMETRY MODES
  ══════════════════════════════════════════════════ -->
  <text x="40" y="534" font-size="10" font-weight="600" fill="#57606a" letter-spacing="0.08em">GEOMETRY MODE</text>
  <line x1="40" y1="538" x2="640" y2="538" stroke="#d0d7de" stroke-width="0.5"/>

  <!-- REGULAR GRID branch -->
  <rect x="30" y="550" width="290" height="90" rx="10" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="175" y="575" font-size="14" font-weight="700" fill="#0c447c" text-anchor="middle">regular_grid</text>
  <text x="175" y="594" font-size="11" fill="#185fa5" text-anchor="middle">cube  →  (ny, nx, nw)</text>
  <text x="175" y="609" font-size="11" fill="#185fa5" text-anchor="middle">x_axis (nx,)   y_axis (ny,)</text>
  <text x="175" y="626" font-size="10" fill="#378add" text-anchor="middle">axes independent — meshgrid applies</text>

  <!-- badge -->
  <rect x="48" y="630" width="76" height="16" rx="8" fill="#185fa5"/>
  <text x="86" y="642" font-size="9" font-weight="600" fill="#e6f1fb" text-anchor="middle">map_shape match</text>

  <!-- POINT COORDINATES branch -->
  <rect x="360" y="550" width="290" height="90" rx="10" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="505" y="575" font-size="14" font-weight="700" fill="#0c447c" text-anchor="middle">point_coordinates</text>
  <text x="505" y="594" font-size="11" fill="#185fa5" text-anchor="middle">spectra  →  (n_points, nw)</text>
  <text x="505" y="609" font-size="11" fill="#185fa5" text-anchor="middle">x (n_pts,)   y (n_pts,)</text>
  <text x="505" y="626" font-size="10" fill="#378add" text-anchor="middle">one coordinate per spectrum</text>

  <!-- badge -->
  <rect x="378" y="630" width="120" height="16" rx="8" fill="#185fa5"/>
  <text x="438" y="642" font-size="9" font-weight="600" fill="#e6f1fb" text-anchor="middle">ORGN per-point coords</text>

  <!-- use case tags -->
  <text x="175" y="658" font-size="10" fill="#57606a" text-anchor="middle">Renishaw maps, full grids</text>
  <text x="505" y="658" font-size="10" fill="#57606a" text-anchor="middle">microplastics, sparse ROI, manual spots</text>

  <!-- arrows down to writer -->
  <line x1="175" y1="660" x2="175" y2="690" stroke="#185fa5" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="505" y1="660" x2="505" y2="690" stroke="#185fa5" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- ═══════════════════════════════════════════════
       SECTION LABEL — OUTPUTS
  ══════════════════════════════════════════════════ -->
  <text x="40" y="676" font-size="10" font-weight="600" fill="#57606a" letter-spacing="0.08em">OUTPUT</text>
  <line x1="40" y1="680" x2="640" y2="680" stroke="#d0d7de" stroke-width="0.5"/>

  <!-- HDF5 writer — grid -->
  <rect x="30" y="692" width="290" height="78" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="175" y="714" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">HDF5 / NeXus writer</text>
  <text x="175" y="731" font-size="11" fill="#0f6e56" text-anchor="middle">ENTRY/data/intensity  (ny, nx, nw)</text>
  <text x="175" y="746" font-size="11" fill="#0f6e56" text-anchor="middle">x (nx,)   y (ny,)   signal="intensity"</text>
  <text x="175" y="761" font-size="10" fill="#1d9e75" text-anchor="middle">NXdata axes: [y, x, raman_shift]</text>

  <!-- HDF5 writer — points -->
  <rect x="360" y="692" width="290" height="78" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="505" y="714" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">HDF5 / NeXus writer</text>
  <text x="505" y="731" font-size="11" fill="#0f6e56" text-anchor="middle">ENTRY/data/spectra  (n_pts, nw)</text>
  <text x="505" y="746" font-size="11" fill="#0f6e56" text-anchor="middle">x, y, point_id   signal="spectra"</text>
  <text x="505" y="761" font-size="10" fill="#1d9e75" text-anchor="middle">NXdata axes: [point_id, raman_shift]</text>

  <!-- arrows to CSV -->
  <line x1="175" y1="770" x2="175" y2="800" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="505" y1="770" x2="505" y2="800" stroke="#6e7781" stroke-width="1" marker-end="url(#arr)"/>

  <!-- CSV / export — grid -->
  <rect x="30" y="802" width="290" height="52" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.75"/>
  <text x="175" y="824" font-size="12" font-weight="600" fill="#2c2c2a" text-anchor="middle">export_csv</text>
  <text x="175" y="842" font-size="11" fill="#5f5e5a" text-anchor="middle">x_um | y_um | wn_1 … wn_n</text>

  <!-- CSV / export — points -->
  <rect x="360" y="802" width="290" height="52" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.75"/>
  <text x="505" y="824" font-size="12" font-weight="600" fill="#2c2c2a" text-anchor="middle">export_csv</text>
  <text x="505" y="842" font-size="11" fill="#5f5e5a" text-anchor="middle">point_id | x | y | wn_1 … wn_n</text>

  <!-- ═══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════ -->
  <line x1="40" y1="868" x2="640" y2="868" stroke="#d0d7de" stroke-width="0.5"/>
  <rect x="40" y="876" width="10" height="10" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.75"/>
  <text x="56" y="886" font-size="10" fill="#57606a">implemented</text>
  <rect x="130" y="876" width="10" height="10" rx="2" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="3 1.5"/>
  <text x="146" y="886" font-size="10" fill="#57606a">planned / optional</text>
  <rect x="260" y="876" width="10" height="10" rx="2" fill="#eeedfe" stroke="#534ab7" stroke-width="0.75"/>
  <text x="276" y="886" font-size="10" fill="#57606a">canonical dict (v1.3 contract)</text>
  <rect x="450" y="876" width="10" height="10" rx="2" fill="#faeeda" stroke="#854f0b" stroke-width="0.75"/>
  <text x="466" y="886" font-size="10" fill="#57606a">validation gate</text>

</svg>
